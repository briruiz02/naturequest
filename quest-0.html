<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medieval Quest</title>

  <link rel="stylesheet" href="https://use.typekit.net/hzq0ftq.css">
  <link href="https://fonts.googleapis.com/css2?family=La+Belle+Aurore&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="quest-0.css">
</head>

<body> 

  <main>  
    
    <div class="scene">  
     
      <img src="border.png" class="border" alt="">
      
      <div class="paper-wrap">
        <img src="old-paper.png" class="message" alt="">

        <div class="container">
          <p class="s0">The king asks for your help</p>
          <h1>Your Quest:</h1>
          <p class="s1">Dear traveler, venture forth and heed the world.</p>
          <p class="s2">Mark well what dost see, and report it true.</p>
          <p class="s3">Thy observations shall determine thy reward.</p>
        </div>
      </div>

      <div class="continue-prompt">
        <p>Press thy coin to accept journey.</p>
      </div>
       
      <img src="keys.png" class="keys" alt="">
      <img src="gcoins.png" class="coins" alt="">
      <img src="fountain-pen.png" class="pen" alt="">

      <button onclick="window.location.href='quest-1.html'" class="button" aria-label="Continue"></button>
    </div>

  </main>
</body>
</html>
