    <div class="scene">

        <div class="container">

          <h1>Thy First Task:</h1>
          <p class="s1">Survey thy surroundings. Take a deepened breath.</p>

          <p class="s3">Mark three things that draw thy eye, prepare to report them.</p>

      </div>
      <img src="keys.png" class="keys" alt="">
