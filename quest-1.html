<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medieval Quest</title>

  <link rel="stylesheet" href="https://use.typekit.net/hzq0ftq.css">
  <link href="https://fonts.googleapis.com/css2?family=La+Belle+Aurore&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="quest-1.css">
</head>

<body> 


  <main> 

    <div class="scene">
      
      <a href="index.html" class="back-btn">Return</a>
     
      <img src="border.png" class="border" alt="">
      
      <div class="paper-wrap">
        <img src="old-paper.png" class="message" alt="">

        <div class="container">
          <p class="s0">The King calls upon you.</p>
          <h1>Your First Task</h1>
          <p class="s1">Walk for 2-5 minutes and observe your surroundings. Take a slow breath and steady your mind.</p>
          <p class="s2"><strong>Notice three things:</strong> Something still, something moving, and something easily missed.</p>
          <p class="s3">Remember them. You will record them when you return.</p>
        </div>
      </div>
      <img src="compass.png" class="compass" alt="">
      <img src="gcoins.png" class="coins" alt="">
      <img src="fountain-pen.png" class="pen" alt="">
      <button onclick="location.href='quest-2.html'" class="button" aria-label="Continue"></button>
    </div>
  </main>
</body>
</html>
