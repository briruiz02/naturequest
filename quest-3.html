<!DOCTYPE html>

<body> 


  <main> 

    <div class="scene">  

     <a href="quest-2.html" class="back-btn">Return</a>

      <img src="border.png" class="border" alt="">
      
      <div class="paper-wrap">
        <img src="old-paper.png" class="message" alt="">

        <div class="container">
          <p class="s0">The King calls upon you.</p>
          <h1>Your Third Task</h1>
          <p class="s1">Close your eyes, if you can.</p>
          <p class="s2">Notice the sounds around you: wind, movement, distant voices, or stillness.</p>
          <p class="s3"><strong>Focus on one sound and follow it.</strong></p>
          <p class="s4">Remember this sound. You will record it upon your return.</p>
        </div>
      </div>
      <img src="feather.png" class="feather" alt="">
      <img src="gcoins.png" class="coins" alt="">
      <img src="fountain-pen.png" class="pen" alt="">
      <button onclick="location.href='quest-4.html'" class="button" aria-label="Continue"></button>
    </div>
  </main>
