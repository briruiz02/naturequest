  <main> 

    <div class="scene">  

      <a href="quest-3.html" class="back-btn">Return</a>

        <div class="container">
          <p class="s0">The King calls upon you.</p>
          <h1>Your Final Task</h1>
          <p class="s1">Pause once more. Think about what you have seen, felt, and heard.</p>
          <p class="s2">Choose one moment that stayed with you. Hold it clearly in your mind.</p>
          <p class="s3">This is what you will return with.</p>

      </div>
      <img src="candle.png" class="candle" alt="">
      <img src="gcoins.png" class="coins" alt="">
      <img src="fountain-pen.png" class="pen" alt="">
