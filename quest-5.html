<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medieval Quest</title>

  <link rel="stylesheet" href="https://use.typekit.net/hzq0ftq.css">

<body> 


  <main> 

    <div class="scene">  

      <a href="quest-4.html" class="back-btn">Return</a>
     
      <img src="border.png" class="border" alt="">
      
      <div class="paper-wrap">
        <img src="old-paper.png" class="message" alt="">

        <div class="container">
          <p class="s0">The King thanks you for your service.</p>
          <h1>Return to the King</h1>
          <p class="s1">You have completed your journey. Present what you have gathered.</p>
          <p class="s2"><strong>Open your journal and record the moment you chose:</strong> what you saw, felt, or heard.</p>
          <p class="s3">Your words will determine your reward.</p>
        </div>
      </div>
      <img src="candle.png" class="candle" alt="">
      <img src="gcoins.png" class="coins" alt="">
      <img src="fountain-pen.png" class="pen" alt="">
      <button onclick="location.href='quest-6.html'" class="button" aria-label="Continue"></button>
    </div>
  </main>
