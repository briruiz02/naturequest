<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Medieval Quest</title>

  <link rel="stylesheet" href="https://use.typekit.net/hzq0ftq.css">
  <link href="https://fonts.googleapis.com/css2?family=La+Belle+Aurore&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="quest-6.css">
</head>

<body> 


  <main> 

    <div class="scene">  

      <a href="quest-5.html" class="back-btn">Return</a>
     
      <img src="border.png" class="border" alt="">
      
      <div class="paper-wrap">
        <img src="old-paper.png" class="message" alt="">

        <div class="container">
          <p class="s0">The king thanks you for your service</p>
          <h1>Congratulations</h1>
          <p class="s1">Well done, traveler.</p>
          <p class="s2">You have completed your quest. 
          <p class="s3">What you noticed was always there, you have simply chose to see it.</p>
          <p class="s4"><strong>Your reward is what you noticed. Carry it with you.</strong></p>
        </div>
      </div>

       <div class="continue-prompt">
        <p>Tap the coin to begin again.</p>
      </div>

      <img src="candle.png" class="candle" alt="">
      <img src="gcoins.png" class="coins" alt="">
      <img src="fountain-pen.png" class="pen" alt="">
      <button onclick="location.href='index.html'" class="button" aria-label="Continue"></button>
    </div>
  </main>
</body>
</html>
